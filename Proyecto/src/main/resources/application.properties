spring.application.name=ProtectoG3

#Puerto donde corre la aplicación
server.port=8080

#Formato de fecha en logs
logging.pattern.dateformat=hh:mm

#Quitar banner de Spring Boot al iniciar
spring.main.banner-mode=off

#Desactivar cache de Thymeleaf para ver cambios en vivo
spring.thymeleaf.cache=false


#Conexión local a la BD proyectog3 en MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyectog3


#Usuario y contraseña de MySQL
spring.datasource.username=root
spring.datasource.password=Axel


#Driver y plataforma de comunicación
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


#Mostrar consultas SQL en consola
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


#Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=update


<html xmlns:th="http://www.thymeleaf.org">

    <body>

        <section th:fragment="servicios">

            <div class="hero">

                <div>
                    <h1>Mantenimiento en todo equipo de computación</h1>
                    <button>Explorar ahora</button>
                </div>

                <div>
                    <img src="/img/servicio.png" width="250">
                </div>

            </div>


            <div class="categorias">

                <div>
                    <img src="/img/reparacion.png" width="70">
                    <p>Reparación</p>
                </div>

                <div>
                    <img src="/img/tinta.png" width="70">
                    <p>Tintas</p>
                </div>

                <div>
                    <img src="/img/laser.png" width="70">
                    <p>Láser</p>
                </div>

                <div>
                    <img src="/img/mantenimiento.png" width="70">
                    <p>Mantenimiento</p>
                </div>

            </div>

            <!-- Banner métodos de pago -->
            <div style="
                background: linear-gradient(135deg, #1a1a2e 0%, #2a2a50 100%);
                border-radius: 16px;
                padding: 2rem 2.5rem;
                margin: 2rem auto;
                max-width: 900px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 1.5rem;
                flex-wrap: wrap;
                box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            ">
                <div style="display:flex; align-items:center; gap:1.25rem; flex-wrap:wrap;">
                    <span style="font-size:2.2rem;">💳</span>
                    <div>
                        <div style="font-family:'Montserrat','Segoe UI',sans-serif; font-weight:800; font-size:1rem; color:white; margin-bottom:4px;">
                            Múltiples métodos de pago
                        </div>
                        <div style="font-size:0.78rem; color:rgba(255,255,255,0.6);">
                            Tarjeta · Efectivo · SINPE Móvil · Transferencia · PayPal
                        </div>
                    </div>
                </div>
                <a href="/pago" style="
                    display:inline-block;
                    padding: 11px 26px;
                    background: linear-gradient(135deg, #e91e8c, #00bcd4);
                    color: white;
                    border-radius: 10px;
                    text-decoration: none;
                    font-family: 'Montserrat','Segoe UI',sans-serif;
                    font-weight: 800;
                    font-size: 0.78rem;
                    letter-spacing: 0.08em;
                    text-transform: uppercase;
                    white-space: nowrap;
                    box-shadow: 0 4px 14px rgba(233,30,140,0.35);
                    transition: opacity 0.2s;
                ">Ver métodos →</a>
            </div>

        </section>

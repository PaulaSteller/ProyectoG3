<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <h1 style="text-align:center;">Catálogo de productos</h1>

        <!-- ===== BARRA DE BÚSQUEDA Y FILTROS (HU 15) ===== -->
        <div class="busqueda-contenedor">
            <form action="/tienda/buscar" method="get" class="busqueda-form">

                <input
                    type="text"
                    name="q"
                    th:value="${q}"
                    placeholder="Buscar por nombre o marca..."
                    class="busqueda-input"
                    />

                <input
                    type="number"
                    name="maxPrecio"
                    th:value="${maxPrecio}"
                    placeholder="Precio máximo (₡)"
                    min="0"
                    class="busqueda-precio"
                    />

                <label class="busqueda-check">
                    <input
                        type="checkbox"
                        name="soloDisponibles"
                        value="true"
                        th:checked="${soloDisponibles}"
                        />
                    Solo disponibles
                </label>

                <button type="submit" class="busqueda-btn">Buscar</button>

                <!-- Botón para limpiar filtros -->
                <a th:if="${q != null or maxPrecio != null or (soloDisponibles != null and soloDisponibles)}"
                   href="/tienda"
                   class="busqueda-limpiar">Limpiar filtros</a>
            </form>

            <!-- Mensaje de resultados -->
            <p th:if="${totalResultados != null}" class="busqueda-resultado-msg">
                <span th:text="${totalResultados}">0</span> resultado(s)
                <span th:if="${q != null and !#strings.isEmpty(q)}">
                    para "<strong th:text="${q}"></strong>"
                </span>
            </p>
        </div>

        <!-- ===== CATÁLOGO DINÁMICO ===== -->
        <div class="catalogo">

            <!-- Sin resultados -->
            <div th:if="${#lists.isEmpty(productos)}" class="sin-resultados">
                <p>No se encontraron productos con esos criterios.</p>
                <a href="/tienda">Ver todos los productos</a>
            </div>

            <!-- Tarjetas dinámicas desde la BD -->
            <div class="card" th:each="p : ${productos}">

                <!-- Imagen: si viene de BD como byte[], se convierte a base64 -->
                <img th:if="${p.imagen != null}"
                     th:src="@{'data:image/jpeg;base64,' + ${#arrays.toBase64(p.imagen)}}"
                     th:alt="${p.nombre}" />
                <img th:unless="${p.imagen != null}"
                     th:src="@{/img/sin-imagen.jpg}"
                     th:alt="${p.nombre}" />

                <h3 th:text="${p.nombre}">Nombre producto</h3>

                <p th:if="${p.marca != null}"
                   style="font-size:0.85em; color:#666;"
                   th:text="${p.marca}">Marca</p>

                <p th:text="'₡' + ${#numbers.formatDecimal(p.precio, 0, 'COMMA', 0, 'POINT')}">
                    ₡0
                </p>

                <span th:if="${p.disponible}"
                      style="color:green; font-size:0.8em;">● Disponible</span>
                <span th:unless="${p.disponible}"
                      style="color:red; font-size:0.8em;">● Agotado</span>

                <button
                    th:onclick="'agregarYIr(' + ${p.id} + ', \'' + ${p.nombre} + '\', ' + ${p.precio} + ', \'/img/sin-imagen.jpg\')'">
                    Añadir al carrito
                </button>
            </div>

        </div>

        <script>
            function agregarYIr(id, nombre, precio, img) {
                let carrito = JSON.parse(localStorage.getItem('refill_carrito') || '{}');
                if (carrito[id]) {
                    carrito[id].qty++;
                } else {
                    carrito[id] = {id: id, name: nombre, price: precio, img: img, qty: 1};
                }
                localStorage.setItem('refill_carrito', JSON.stringify(carrito));
                window.location.href = '/carrito';
            }
        </script>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>

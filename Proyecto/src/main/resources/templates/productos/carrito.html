<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refill — Carrito de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f5fb;
    --white: #ffffff;
    --dark: #1a1a2e;
    --cyan: #00bcd4;
    --fuchsia: #e91e8c;
    --yellow: #ffc107;
    --text: #333344;
    --muted: #8888a0;
    --border: #e0e0ee;
    --green: #00c853;
    --card-shadow: 0 2px 18px rgba(0,0,0,0.07);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'Open Sans',sans-serif; color:var(--text); min-height:100vh; }

  /* HEADER */
  header {
    background:var(--white);
    box-shadow:0 2px 14px rgba(0,0,0,0.09);
    padding:0 2.5rem;
    height:68px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    position:sticky;
    top:0;
    z-index:100;
  }
  .logo { font-family:'Montserrat',sans-serif; font-weight:900; font-size:2rem; letter-spacing:0.04em; user-select:none; }
  .logo .r  { color:var(--dark); }
  .logo .ef { color:var(--cyan); }
  .logo .i  { color:var(--fuchsia); }
  .logo .ll { color:var(--yellow); }
  .header-sub { font-size:0.7rem; color:var(--muted); letter-spacing:0.14em; text-transform:uppercase; }

  /* LAYOUT */
  .main { max-width:1160px; margin:0 auto; padding:2rem 1.5rem; display:grid; grid-template-columns:1fr 360px; gap:2rem; }

  /* SECTION TITLE */
  .section-title {
    font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.68rem;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--muted);
    margin-bottom:1.25rem; display:flex; align-items:center; gap:0.75rem;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* GRID */
  .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:1.25rem; }

  /* PRODUCT CARD */
  .product-card {
    background:var(--white); border-radius:14px; box-shadow:var(--card-shadow);
    overflow:hidden; transition:transform 0.2s, box-shadow 0.2s;
    position:relative; border:2px solid transparent;
  }
  .product-card:hover { transform:translateY(-5px); box-shadow:0 10px 32px rgba(0,0,0,0.11); }
  .product-card.in-cart { border-color:var(--cyan); }

  .product-img-wrap {
    width:100%; height:180px; background:#f7f8fd;
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .product-img-wrap img { width:100%; height:100%; object-fit:contain; padding:14px; }

  .product-info { padding:1rem 1.1rem; }

  .product-tag {
    display:inline-block; font-size:0.58rem; font-weight:700;
    letter-spacing:0.12em; text-transform:uppercase; color:var(--cyan);
    background:rgba(0,188,212,0.09); border-radius:20px; padding:2px 8px; margin-bottom:6px;
  }
  .product-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.87rem; line-height:1.35; color:var(--dark); margin-bottom:0.45rem; }
  .product-price { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.05rem; color:var(--fuchsia); margin-bottom:0.85rem; }

  .qty-badge {
    position:absolute; top:10px; right:10px;
    background:var(--cyan); color:white; font-size:0.62rem; font-weight:800;
    width:22px; height:22px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    opacity:0; transform:scale(0);
    transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .qty-badge.show { opacity:1; transform:scale(1); }

  .add-btn {
    width:100%; padding:9px; border:2px solid var(--border); border-radius:8px;
    background:transparent; font-family:'Montserrat',sans-serif; font-weight:700;
    font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase;
    color:var(--text); cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:5px;
  }
  .add-btn:hover { background:var(--cyan); border-color:var(--cyan); color:white; }
  .add-btn.added { background:var(--green); border-color:var(--green); color:white; }

  /* CART */
  .cart-section { position:sticky; top:84px; height:fit-content; }
  .cart-panel { background:var(--white); border-radius:14px; box-shadow:var(--card-shadow); overflow:hidden; }

  .cart-header {
    padding:1.1rem 1.4rem; display:flex; align-items:center; justify-content:space-between;
    background:linear-gradient(135deg, var(--dark) 0%, #2a2a50 100%);
    border-bottom:3px solid var(--cyan);
  }
  .cart-title { font-family:'Montserrat',sans-serif; font-weight:800; font-size:0.88rem; letter-spacing:0.04em; color:white; display:flex; align-items:center; gap:0.5rem; }
  .cart-pill { background:var(--fuchsia); color:white; font-size:0.6rem; padding:2px 8px; border-radius:20px; font-family:'Open Sans',sans-serif; font-weight:600; }
  .cart-clear { background:transparent; border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.6); font-size:0.6rem; font-family:'Open Sans',sans-serif; letter-spacing:0.08em; text-transform:uppercase; padding:4px 10px; border-radius:4px; cursor:pointer; transition:all 0.2s; }
  .cart-clear:hover { color:white; border-color:rgba(255,255,255,0.5); }

  .cart-body { max-height:390px; overflow-y:auto; padding:0.75rem; }
  .cart-body::-webkit-scrollbar { width:4px; }
  .cart-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .cart-empty { padding:2.8rem 1rem; text-align:center; color:var(--muted); font-size:0.8rem; line-height:1.8; }
  .cart-empty-icon { font-size:2.4rem; margin-bottom:0.6rem; opacity:0.3; display:block; }

  .cart-item {
    display:flex; gap:0.75rem; padding:0.75rem; border:1px solid var(--border); border-radius:10px;
    margin-bottom:0.6rem; background:#fafbff;
    animation:fadeDown 0.25s ease; transition:opacity 0.2s;
  }
  .cart-item.removing { animation:fadeUp 0.2s ease forwards; }

  @keyframes fadeDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeUp   { to   { opacity:0; transform:translateY(-8px); height:0; padding:0; margin:0; overflow:hidden; } }

  .ci-img { width:52px; height:52px; border-radius:8px; overflow:hidden; flex-shrink:0; background:#f0f1f9; display:flex; align-items:center; justify-content:center; }
  .ci-img img { width:100%; height:100%; object-fit:contain; padding:4px; }
  .ci-info { flex:1; min-width:0; }
  .ci-name { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.73rem; color:var(--dark); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .ci-unit { font-size:0.62rem; color:var(--muted); margin-bottom:5px; }
  .qty-row { display:flex; align-items:center; gap:4px; }
  .qbtn { width:22px; height:22px; border:1px solid var(--border); border-radius:5px; background:white; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:0.9rem; color:var(--text); transition:all 0.15s; line-height:1; font-family:monospace; }
  .qbtn:hover   { border-color:var(--cyan);    color:var(--cyan);    background:rgba(0,188,212,0.06); }
  .qbtn.m:hover { border-color:var(--fuchsia); color:var(--fuchsia); background:rgba(233,30,140,0.06); }
  .qnum { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.76rem; min-width:18px; text-align:center; color:var(--dark); }
  .ci-right { display:flex; flex-direction:column; align-items:flex-end; gap:5px; flex-shrink:0; }
  .ci-sub { font-family:'Montserrat',sans-serif; font-weight:900; font-size:0.82rem; color:var(--fuchsia); white-space:nowrap; }

  /* FOOTER */
  .cart-footer { padding:1.1rem 1.4rem; border-top:1px solid var(--border); }
  .tot-row { display:flex; justify-content:space-between; align-items:center; font-size:0.7rem; color:var(--muted); padding:3px 0; }
  .divider { height:1px; background:var(--border); margin:0.75rem 0; }
  .big-row { display:flex; justify-content:space-between; align-items:center; }
  .total-label { font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.76rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--dark); }
  .total-amount { font-family:'Montserrat',sans-serif; font-weight:900; font-size:1.45rem; color:var(--green); transition:color 0.3s; }
  .total-amount.bump { animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.18);color:var(--fuchsia)} 100%{transform:scale(1)} }

  .checkout-btn {
    width:100%; margin-top:1rem; padding:13px;
    background:linear-gradient(135deg, var(--fuchsia) 0%, var(--cyan) 100%);
    border:none; border-radius:10px; color:white;
    font-family:'Montserrat',sans-serif; font-weight:800; font-size:0.8rem;
    letter-spacing:0.08em; text-transform:uppercase; cursor:pointer;
    transition:all 0.2s; box-shadow:0 4px 16px rgba(233,30,140,0.3);
  }
  .checkout-btn:hover { opacity:0.9; transform:translateY(-1px); box-shadow:0 7px 22px rgba(233,30,140,0.38); }
  .checkout-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }

  .toast {
    position:fixed; bottom:1.5rem; right:1.5rem;
    background:var(--dark); color:var(--yellow);
    padding:10px 18px; border-radius:8px;
    font-family:'Montserrat',sans-serif; font-weight:700; font-size:0.73rem;
    transform:translateY(60px); opacity:0;
    transition:all 0.3s cubic-bezier(0.34,1.3,0.64,1);
    z-index:999; pointer-events:none;
    box-shadow:0 4px 18px rgba(0,0,0,0.18);
  }
  .toast.show { transform:translateY(0); opacity:1; }

  @media(max-width:840px){ .main{grid-template-columns:1fr;} .cart-section{position:static;} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="r">R</span><span class="ef">ef</span><span class="i">i</span><span class="ll">ll</span>
  </div>
  <div class="header-sub">Tienda en línea</div>
</header>

<div class="main">
  <section>
    <div class="section-title">Mi carrito de compras</div>
    <div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:1rem;color:var(--muted);">
      <div style="font-size:4rem;opacity:0.15;">🛒</div>
      <div style="font-family:'Montserrat',sans-serif;font-size:0.85rem;text-align:center;line-height:1.8;">
        Los productos agregados desde la tienda<br>aparecerán en el panel derecho.
      </div>
      <a href="/tienda" style="display:inline-block;margin-top:0.5rem;padding:10px 24px;background:linear-gradient(135deg,var(--fuchsia),var(--cyan));color:white;border-radius:8px;font-family:'Montserrat',sans-serif;font-weight:700;font-size:0.78rem;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;">
        ← Seguir comprando
      </a>
    </div>
  </section>

  <aside class="cart-section">
    <div class="cart-panel">
      <div class="cart-header">
        <div class="cart-title">
          🛒 Mi Carrito
          <span class="cart-pill" id="cart-count">0 items</span>
        </div>
        <button class="cart-clear" onclick="clearCart()">Vaciar</button>
      </div>
      <div class="cart-body" id="cart-body">
        <div class="cart-empty">
          <span class="cart-empty-icon">🛒</span>
          Tu carrito está vacío.<br>¡Agrega productos!
        </div>
      </div>
      <div class="cart-footer">
        <div class="tot-row"><span>Artículos</span><span id="items-total">0</span></div>
        <div class="divider"></div>
        <div class="big-row">
          <span class="total-label">Total a pagar</span>
          <span class="total-amount" id="cart-total">₡0</span>
        </div>
        <button class="checkout-btn" id="checkout-btn" disabled onclick="checkout()">
          Finalizar compra →
        </button>
      </div>
    </div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script>
const fmt = n => "\u20a1" + n.toLocaleString("es-CR");

let cart = {};

// Cargar desde localStorage al abrir la página
function cargarDesdeStorage() {
  const data = localStorage.getItem('refill_carrito');
  if (data) {
    const stored = JSON.parse(data);
    // Convertir formato storage al formato interno del carrito
    Object.values(stored).forEach(item => {
      cart[item.id] = { product: { id: item.id, name: item.name, price: item.price, img: item.img }, qty: item.qty };
    });
  }
}

// Sincronizar cart interno al localStorage
function guardarEnStorage() {
  const data = {};
  Object.values(cart).forEach(({ product: p, qty }) => {
    data[p.id] = { id: p.id, name: p.name, price: p.price, img: p.img, qty: qty };
  });
  localStorage.setItem('refill_carrito', JSON.stringify(data));
}

function renderProducts() {
  // El carrito ya no muestra grid de productos fijos, solo el panel lateral
}

function renderCart() {
  const items = Object.values(cart);
  if (!items.length) {
    document.getElementById("cart-body").innerHTML = `
      <div class="cart-empty"><span class="cart-empty-icon">\u{1F6D2}</span>Tu carrito está vacío.<br>¡Agrega productos desde la <a href="/tienda" style="color:var(--cyan)">tienda</a>!</div>`;
    return;
  }
  document.getElementById("cart-body").innerHTML = items.map(({product:p, qty}) => `
    <div class="cart-item" id="ci-${p.id}">
      <div class="ci-img"><img src="${p.img}" alt="${p.name}" onerror="this.style.display='none'"></div>
      <div class="ci-info">
        <div class="ci-name">${p.name}</div>
        <div class="ci-unit">${fmt(p.price)} / unidad</div>
        <div class="qty-row">
          <button class="qbtn m" onclick="changeQty(${p.id},-1)">\u2212</button>
          <span class="qnum">${qty}</span>
          <button class="qbtn"   onclick="changeQty(${p.id}, 1)">+</button>
        </div>
      </div>
      <div class="ci-right"><div class="ci-sub">${fmt(p.price*qty)}</div></div>
    </div>`).join("");
}

function updateTotals() {
  const items = Object.values(cart);
  const qty   = items.reduce((s,i)=>s+i.qty,0);
  const total = items.reduce((s,i)=>s+i.product.price*i.qty,0);
  document.getElementById("cart-count").textContent  = qty+" item"+(qty!==1?"s":"");
  document.getElementById("items-total").textContent = qty;
  document.getElementById("checkout-btn").disabled   = qty===0;
  const el  = document.getElementById("cart-total");
  const txt = fmt(total);
  if (el.textContent!==txt) {
    el.textContent=txt;
    el.classList.remove("bump"); void el.offsetWidth; el.classList.add("bump");
  }
}

function changeQty(id, d) {
  if (!cart[id]) return;
  cart[id].qty += d;
  if (cart[id].qty<=0) {
    const el=document.getElementById("ci-"+id);
    if(el){el.classList.add("removing");setTimeout(()=>{delete cart[id];guardarEnStorage();updateAll();},200);}
    else {delete cart[id];guardarEnStorage();updateAll();}
    return;
  }
  guardarEnStorage();
  updateAll();
}

function clearCart() {
  cart={};
  guardarEnStorage();
  updateAll();
  showToast("Carrito vaciado");
}

function updateAll() { renderCart(); updateTotals(); }

let tt;
function showToast(msg) {
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove("show"),2200);
}

function checkout() {
  const total=Object.values(cart).reduce((s,i)=>s+i.product.price*i.qty,0);
  alert("Pedido confirmado\n\nTotal: "+fmt(total)+"\n\n¡Gracias por comprar en Refill!");
  cart={};
  guardarEnStorage();
  updateAll();
}

// Iniciar
cargarDesdeStorage();
updateAll();
</script>
</body>
</html>

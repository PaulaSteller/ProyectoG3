<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <style>
            .resenas-page {
                max-width: 900px;
                margin: 0 auto;
                padding: 2.5rem 1.5rem;
                font-family: Arial, sans-serif;
            }

            .resenas-page h1 {
                text-align: center;
                font-size: 1.8rem;
                color: #1a1a2e;
                margin-bottom: 0.4rem;
            }

            .resenas-page h1 span {
                color: #00bcd4;
            }

            .resenas-subtitulo {
                text-align: center;
                color: #8888a0;
                font-size: 0.9rem;
                margin-bottom: 2.5rem;
            }

            /* FORMULARIO */
            .form-resena {
                background: #f5f5f5;
                border-radius: 10px;
                padding: 2rem;
                margin-bottom: 2.5rem;
            }

            .form-resena h2 {
                font-size: 1rem;
                color: #1a1a2e;
                margin-bottom: 1.25rem;
            }

            .form-group {
                margin-bottom: 1.1rem;
            }

            .form-group label {
                display: block;
                font-size: 0.82rem;
                font-weight: bold;
                color: #333;
                margin-bottom: 5px;
            }

            .form-group select,
            .form-group input,
            .form-group textarea {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #ddd;
                border-radius: 5px;
                font-family: Arial, sans-serif;
                font-size: 0.85rem;
                background: white;
                box-sizing: border-box;
                transition: border-color 0.2s;
            }

            .form-group select:focus,
            .form-group input:focus,
            .form-group textarea:focus {
                outline: none;
                border-color: #00bcd4;
            }

            .form-group textarea {
                resize: vertical;
                min-height: 100px;
            }

            /* ESTRELLAS */
            .estrellas-input {
                display: flex;
                flex-direction: row-reverse;
                justify-content: flex-end;
                gap: 4px;
            }

            .estrellas-input input {
                display: none;
            }

            .estrellas-input label {
                font-size: 2rem;
                color: #ddd;
                cursor: pointer;
                transition: color 0.15s;
                margin: 0;
                padding: 0;
            }

            .estrellas-input label:hover,
            .estrellas-input label:hover ~ label,
            .estrellas-input input:checked ~ label {
                color: #ffc107;
            }

            /* BOTÓN ENVIAR */
            .btn-enviar {
                background: #007BFF;
                color: white;
                border: none;
                padding: 11px 28px;
                border-radius: 5px;
                font-size: 0.85rem;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.2s;
            }

            .btn-enviar:hover {
                background: #0056b3;
            }

            /* LISTA DE RESEÑAS */
            .resenas-titulo {
                font-size: 1rem;
                font-weight: bold;
                color: #1a1a2e;
                margin-bottom: 1.25rem;
                padding-bottom: 0.5rem;
                border-bottom: 2px solid #e0e0ee;
            }

            .resena-card {
                background: #f5f5f5;
                border-radius: 10px;
                padding: 1.25rem 1.5rem;
                margin-bottom: 1rem;
                animation: fadeIn 0.3s ease;
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(-6px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .resena-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 0.5rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }

            .resena-autor {
                font-weight: bold;
                font-size: 0.88rem;
                color: #1a1a2e;
            }

            .resena-producto {
                font-size: 0.72rem;
                color: white;
                background: #00bcd4;
                padding: 2px 10px;
                border-radius: 20px;
            }

            .resena-estrellas {
                color: #ffc107;
                font-size: 1.1rem;
                margin-bottom: 0.4rem;
            }

            .resena-comentario {
                font-size: 0.84rem;
                color: #555;
                line-height: 1.6;
            }

            .resena-fecha {
                font-size: 0.7rem;
                color: #aaa;
                margin-top: 0.5rem;
            }

            .sin-resenas {
                text-align: center;
                color: #aaa;
                font-size: 0.85rem;
                padding: 2rem;
                background: #f5f5f5;
                border-radius: 10px;
            }

            .resumen-estrellas {
                display: flex;
                align-items: center;
                gap: 1rem;
                background: #f5f5f5;
                border-radius: 10px;
                padding: 1.25rem 1.5rem;
                margin-bottom: 2rem;
                flex-wrap: wrap;
            }

            .promedio-numero {
                font-size: 3rem;
                font-weight: 900;
                color: #1a1a2e;
                line-height: 1;
            }

            .promedio-estrellas {
                color: #ffc107;
                font-size: 1.4rem;
            }

            .promedio-total {
                font-size: 0.78rem;
                color: #aaa;
            }
        </style>

        <div class="resenas-page">

            <h1>Reseñas de <span>Productos</span></h1>
            <p class="resenas-subtitulo">Compartí tu experiencia y ayudá a otros clientes</p>

            <!-- Resumen -->
            <div class="resumen-estrellas" id="resumen">
                <div class="promedio-numero" id="promedio-num">—</div>
                <div>
                    <div class="promedio-estrellas" id="promedio-estrellas">☆☆☆☆☆</div>
                    <div class="promedio-total" id="promedio-total">Sin reseñas aún</div>
                </div>
            </div>

            <!-- Formulario -->
            <div class="form-resena">
                <h2>✍️ Escribí tu reseña</h2>

                <div class="form-group">
                    <label>Tu nombre</label>
                    <input type="text" id="inp-nombre" placeholder="Ej: Juan Pérez" maxlength="50">
                </div>

                <div class="form-group">
                    <label>Producto</label>
                    <select id="inp-producto">
                        <option value="">— Seleccioná un producto —</option>
                        <option>Portátil Dell G15 5530</option>
                        <option>ASUS ROG Strix G16CH</option>
                        <option>Laptop HP Victus</option>
                        <option>Tinta Epson 673</option>
                        <option>Impresora Epson L4150</option>
                        <option>Monitor Xiaomi A24i</option>
                        <option>Inyección de tinta</option>
                        <option>Monitor 23.8 Asus 165hz</option>
                        <option>Mouse Razer BASILISK</option>
                        <option>Monitor Xiaomi</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Calificación</label>
                    <div class="estrellas-input">
                        <input type="radio" id="s5" name="estrellas" value="5">
                        <label for="s5">★</label>
                        <input type="radio" id="s4" name="estrellas" value="4">
                        <label for="s4">★</label>
                        <input type="radio" id="s3" name="estrellas" value="3">
                        <label for="s3">★</label>
                        <input type="radio" id="s2" name="estrellas" value="2">
                        <label for="s2">★</label>
                        <input type="radio" id="s1" name="estrellas" value="1">
                        <label for="s1">★</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Comentario</label>
                    <textarea id="inp-comentario" placeholder="Contanos tu experiencia con el producto..."></textarea>
                </div>

                <button class="btn-enviar" onclick="enviarResena()">Publicar reseña</button>
            </div>

            <!-- Lista de reseñas -->
            <div class="resenas-titulo">💬 Reseñas de clientes</div>
            <div id="lista-resenas">
                <div class="sin-resenas" id="sin-resenas">
                    Todavía no hay reseñas. ¡Sé el primero en comentar!
                </div>
            </div>

        </div>

        <script>
        const ejemplos = [
            { nombre: "Carlos M.", producto: "ASUS ROG Strix G16CH", estrellas: 5, comentario: "Excelente laptop, muy rápida para juegos y edición. La recomiendo totalmente.", fecha: "15 de abril, 2026" },
            { nombre: "Ana R.", producto: "Impresora Epson L4150", estrellas: 4, comentario: "Muy buena impresora, calidad de impresión increíble. El setup fue un poco complicado.", fecha: "10 de abril, 2026" }
        ];
        let resenas = JSON.parse(localStorage.getItem('refill_resenas') || 'null');
        if (!resenas) { resenas = ejemplos; }

        function estrellas(n) {
            return '★'.repeat(n) + '☆'.repeat(5 - n);
        }

        function fechaHoy() {
            return new Date().toLocaleDateString('es-CR', { day:'2-digit', month:'long', year:'numeric' });
        }

        function enviarResena() {
            const nombre     = document.getElementById('inp-nombre').value.trim();
            const producto   = document.getElementById('inp-producto').value;
            const comentario = document.getElementById('inp-comentario').value.trim();
            const sel        = document.querySelector('input[name="estrellas"]:checked');

            if (!nombre)     { alert('Por favor ingresá tu nombre.'); return; }
            if (!producto)   { alert('Por favor seleccioná un producto.'); return; }
            if (!sel)        { alert('Por favor elegí una calificación.'); return; }
            if (!comentario) { alert('Por favor escribí un comentario.'); return; }

            const nueva = {
                nombre,
                producto,
                estrellas: parseInt(sel.value),
                comentario,
                fecha: fechaHoy()
            };

            resenas.unshift(nueva);
            localStorage.setItem('refill_resenas', JSON.stringify(resenas));

            // Limpiar formulario
            document.getElementById('inp-nombre').value = '';
            document.getElementById('inp-producto').value = '';
            document.getElementById('inp-comentario').value = '';
            document.querySelectorAll('input[name="estrellas"]').forEach(r => r.checked = false);

            renderResenas();
        }

        function renderResenas() {
            const lista = document.getElementById('lista-resenas');

            if (!resenas.length) {
                lista.innerHTML = '<div class="sin-resenas" id="sin-resenas">Todavía no hay reseñas. ¡Sé el primero en comentar!</div>';
                actualizarResumen();
                return;
            }

            lista.innerHTML = resenas.map(r => `
                <div class="resena-card">
                    <div class="resena-header">
                        <span class="resena-autor">👤 ${r.nombre}</span>
                        <span class="resena-producto">${r.producto}</span>
                    </div>
                    <div class="resena-estrellas">${estrellas(r.estrellas)}</div>
                    <div class="resena-comentario">${r.comentario}</div>
                    <div class="resena-fecha">${r.fecha}</div>
                </div>
            `).join('');

            actualizarResumen();
        }

        function actualizarResumen() {
            if (!resenas.length) {
                document.getElementById('promedio-num').textContent = '—';
                document.getElementById('promedio-estrellas').textContent = '☆☆☆☆☆';
                document.getElementById('promedio-total').textContent = 'Sin reseñas aún';
                return;
            }
            const prom = resenas.reduce((s, r) => s + r.estrellas, 0) / resenas.length;
            document.getElementById('promedio-num').textContent = prom.toFixed(1);
            document.getElementById('promedio-estrellas').textContent = estrellas(Math.round(prom));
            document.getElementById('promedio-total').textContent = resenas.length + ' reseña' + (resenas.length !== 1 ? 's' : '');
        }

        // Iniciar
        renderResenas();
        </script>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
